apiVersion: v1
kind: Secret
metadata:
  name: github-ssh-key
  namespace: dev
type: Opaque
data:
  # base64-encode your private key: base64 -w0 ~/.ssh/id_rsa
  id_rsa: "<base64-encoded-private-key>"
  # base64-encode your PAT: echo -n 'ghp_yourtoken' | base64 -w0
  github_token: "<base64-encoded-PAT>"
