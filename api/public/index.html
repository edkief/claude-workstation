<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Workstation</title>
<style>
  /* ---------- Design tokens ---------- */
  :root {
    color-scheme: dark;
    --bg:            #0d1117;
    --surface:       #161b22;
    --surface-2:     #21262d;
    --border:        #30363d;
    --border-subtle: #21262d;
    --border-strong: #8b949e;

    --text:          #e6edf3;
    --text-muted:    #8b949e;
    --text-subtle:   #6e7681;

    --accent:        #58a6ff;
    --accent-hover:  #79c0ff;
    --accent-soft:   rgba(88, 166, 255, .12);

    --success:       #3fb950;
    --success-soft:  rgba(63, 185, 80, .12);
    --danger:        #f85149;
    --danger-soft:   rgba(248, 81, 73, .10);
    --danger-border: rgba(248, 81, 73, .38);
    --primary:       #238636;
    --primary-hover: #2ea043;
    --warning:       #d29922;
    --warning-soft:  rgba(210, 153, 34, .12);

    --radius:        10px;
    --radius-sm:     6px;
    --radius-pill:   999px;
    --shadow:        0 1px 3px rgba(1, 4, 9, .55), 0 8px 24px rgba(1, 4, 9, .25);

    --font-ui:   -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }

  @media (prefers-color-scheme: light) {
    :root {
      color-scheme: light;
      --bg:            #ffffff;
      --surface:       #f6f8fa;
      --surface-2:     #eaeef2;
      --border:        #d0d7de;
      --border-subtle: #d8dee4;
      --border-strong: #8c959f;

      --text:          #1f2328;
      --text-muted:    #656d76;
      --text-subtle:   #818b98;

      --accent:        #0969da;
      --accent-hover:  #0860ca;
      --accent-soft:   rgba(9, 105, 218, .10);

      --success:       #1a7f37;
      --success-soft:  rgba(26, 127, 55, .10);
      --danger:        #cf222e;
      --danger-soft:   rgba(207, 34, 46, .08);
      --danger-border: rgba(207, 34, 46, .35);
      --primary:       #1f883d;
      --primary-hover: #1a7f37;
      --warning:       #9a6700;
      --warning-soft:  rgba(154, 103, 0, .10);

      --shadow:        0 1px 0 rgba(31, 35, 40, .04), 0 4px 14px rgba(31, 35, 40, .08);
    }
  }

  /* ---------- Base ---------- */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: clamp(1rem, 3vw, 2.25rem);
    display: flex;
    flex-direction: column;
    gap: clamp(1rem, 2.5vw, 1.75rem);
  }
  code, .mono { font-family: var(--font-mono); }
  a { color: var(--accent); }

  /* ---------- Header ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-subtle);
  }
  .topbar-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: .85rem clamp(1rem, 3vw, 2.25rem);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .topbar-overall { display: flex; gap: .75rem; align-items: flex-end; margin-left: auto; margin-right: .5rem; }
  .topbar-overall .stat-bar-group { min-width: 80px; max-width: 110px; }
  .topbar-overall .stat-bar-track { height: 3px; }
  .brand { display: flex; align-items: baseline; gap: .6rem; flex-wrap: wrap; }
  .brand h1 { font-size: 1.15rem; font-weight: 600; letter-spacing: -.01em; }
  .brand .dot { color: var(--accent); }
  .pod-chip {
    font-family: var(--font-mono);
    font-size: .72rem;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: .1rem .55rem;
  }
  .pod-chip:empty { display: none; }
  .quick-links { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
  .quick-link {
    font-size: .82rem;
    color: var(--text-muted);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: .35rem .7rem;
    background: var(--surface);
    transition: color .12s, border-color .12s, background .12s;
  }
  .quick-link:hover { color: var(--text); border-color: var(--border-strong); }

  /* ---------- Cards ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border-subtle);
    flex-wrap: wrap;
  }
  .card-head h2 {
    font-size: .8rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .card-body { padding: 1.25rem; }

  /* ---------- Session cards ---------- */
  .session-list { display: flex; flex-direction: column; gap: .65rem; padding: 1.25rem; }
  .session-card {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg);
    padding: .85rem 1rem;
    display: flex;
    flex-direction: column;
    gap: .55rem;
  }
  .session-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .75rem;
  }
  .session-name {
    font-family: var(--font-mono);
    font-size: .85rem;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: .75rem;
    flex-wrap: wrap;
  }
  .session-repo {
    font-family: var(--font-mono);
    font-size: .78rem;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-repo .branch { color: var(--accent); }
  .session-time { font-size: .78rem; color: var(--text-subtle); white-space: nowrap; flex-shrink: 0; }
  .session-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: .5rem;
    flex-wrap: wrap;
  }
  .session-stats { display: flex; gap: 1rem; flex-grow: 1; }
  .session-actions { display: flex; gap: .4rem; flex-shrink: 0; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    font-size: .76rem;
    font-weight: 500;
    padding: .15rem .55rem;
    border-radius: var(--radius-pill);
    text-transform: capitalize;
  }
  .badge::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .badge.running { color: var(--success); background: var(--success-soft); }
  .badge.dead    { color: var(--danger);  background: var(--danger-soft); }

  /* ---------- Resource monitoring ---------- */
  .session-stats { display: flex; gap: 1rem; flex-grow: 1; }
  .stat-bar-group { display: flex; flex-direction: column; gap: .2rem; min-width: 90px; flex: 1; max-width: 140px; }
  .stat-bar-row { display: flex; justify-content: space-between; align-items: baseline; gap: .25rem; }
  .stat-label { text-transform: uppercase; letter-spacing: .06em; font-size: .63rem; color: var(--text-muted); }
  .stat-value { font-family: var(--font-mono); font-size: .72rem; color: var(--text); white-space: nowrap; }
  .stat-value.placeholder { color: var(--text-muted); }
  .stat-bar-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    width: 0%;
    background: var(--success);
    transition: width .5s cubic-bezier(.4,0,.2,1), background-color .4s ease;
  }
  .stat-bar-fill.warn { background: var(--warning); }
  .stat-bar-fill.crit { background: var(--danger); }

  /* ---------- Forms ---------- */
  form { display: grid; gap: 1rem; max-width: 540px; }
  label { font-size: .85rem; color: var(--text-muted); display: flex; flex-direction: column; gap: .35rem; }
  label > span:first-child { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; color: var(--text); font-weight: 500; }
  .field-note { color: var(--text-muted); font-weight: 400; }
  input[type=text], input[type=number], select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: .55rem .7rem;
    font-family: inherit;
    font-size: .875rem;
    width: 100%;
    transition: border-color .12s, box-shadow .12s;
  }
  input::placeholder { color: var(--text-subtle); }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  select option { background: var(--surface); color: var(--text); }
  .checkbox-row { flex-direction: row; align-items: center; gap: .55rem; cursor: pointer; font-weight: 400; color: var(--text); }
  input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; flex: none; }
  .mode-toggle {
    font-size: .78rem; color: var(--accent); cursor: pointer;
    background: none; border: none; padding: 0; font-family: inherit; font-weight: 500;
  }
  .mode-toggle:hover { color: var(--accent-hover); text-decoration: underline; }
  .repo-hint { font-size: .75rem; color: var(--text-muted); }

  /* ---------- Buttons ---------- */
  .btn {
    font-family: inherit;
    font-size: .82rem;
    font-weight: 500;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: .45rem .85rem;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .35rem;
    transition: background .12s, border-color .12s, color .12s;
  }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn:disabled { opacity: .55; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
  .btn-ghost { background: var(--surface-2); color: var(--accent); border-color: var(--border); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--border-strong); }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger-border); }
  .btn-danger:hover:not(:disabled) { background: var(--danger-soft); }
  .btn-sm { font-size: .78rem; padding: .35rem .7rem; }

  /* ---------- Cleanup row ---------- */
  .cleanup-row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
  .cleanup-row .muted { font-size: .875rem; color: var(--text-muted); }
  #cleanup-days { width: 4.5rem; }
  #cleanup-result { font-size: .85rem; color: var(--text-muted); }

  /* ---------- Misc ---------- */
  .empty { color: var(--text-muted); font-size: .875rem; padding: 1.5rem; text-align: center; }
  .form-actions { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .msg { font-size: .85rem; min-height: 1.2rem; }
  #msg-error   { color: var(--danger); }
  #msg-success { color: var(--success); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(255, 255, 255, .4); border-top-color: #fff;
    border-radius: 50%; animation: spin .7s linear infinite;
  }

  /* ---------- Confirm modal ---------- */
  @keyframes modal-in {
    from { opacity: 0; transform: scale(.96) translateY(-6px); }
    to   { opacity: 1; transform: scale(1)  translateY(0); }
  }
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(1, 4, 9, .65);
    backdrop-filter: blur(3px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  @media (prefers-color-scheme: light) {
    #modal-overlay { background: rgba(31, 35, 40, .45); }
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow), 0 0 0 1px var(--border-subtle);
    max-width: 420px;
    width: 100%;
    animation: modal-in .15s ease;
  }
  .modal-body {
    padding: 1.5rem 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }
  .modal-body h3 { font-size: 1rem; font-weight: 600; color: var(--text); }
  .modal-body p  { font-size: .875rem; color: var(--text-muted); line-height: 1.6; }
  .modal-footer {
    padding: .75rem 1.5rem 1.25rem;
    display: flex;
    justify-content: flex-end;
    gap: .5rem;
  }

  @media (max-width: 640px) {
    form { max-width: none; }
    .card-body { padding: 1rem; }
    .session-list { padding: 1rem; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <h1>Claude <span class="dot">·</span> Workstation</h1>
      <span class="pod-chip" id="pod-name"></span>
    </div>
    <div class="topbar-overall">
      <div class="stat-bar-group">
        <div class="stat-bar-row">
          <span class="stat-label">CPU</span>
          <span class="stat-value placeholder" id="overall-cpu">—</span>
        </div>
        <div class="stat-bar-track"><div class="stat-bar-fill" id="overall-cpu-bar"></div></div>
      </div>
      <div class="stat-bar-group">
        <div class="stat-bar-row">
          <span class="stat-label">Mem</span>
          <span class="stat-value placeholder" id="overall-mem">—</span>
        </div>
        <div class="stat-bar-track"><div class="stat-bar-fill" id="overall-mem-bar"></div></div>
      </div>
    </div>
    <nav class="quick-links">
      <a href="/tty" target="_blank" class="quick-link">Terminal</a>
      <a href="https://claude.ai/code" target="_blank" class="quick-link">claude.ai/code</a>
    </nav>
  </div>
</header>

<main class="wrap">

  <section class="card">
    <div class="card-head">
      <h2>Active Sessions</h2>
      <button class="btn btn-danger btn-sm" id="remove-inactive-btn" onclick="removeInactiveSessions()">Remove inactive</button>
    </div>
    <div id="sessions-container"><p class="empty">Loading…</p></div>
  </section>

  <section class="card">
    <div class="card-head">
      <h2>Workspace Cleanup</h2>
      <div class="stat-bar-group" style="min-width:120px;max-width:160px;">
        <div class="stat-bar-row">
          <span class="stat-label">disk</span>
          <span class="stat-value placeholder" id="disk-usage">—</span>
        </div>
        <div class="stat-bar-track"><div class="stat-bar-fill" id="disk-bar"></div></div>
      </div>
    </div>
    <div class="card-body">
      <div class="cleanup-row">
        <span class="muted">Retain workspaces from the last</span>
        <input type="number" id="cleanup-days" min="1" value="7">
        <span class="muted">days</span>
        <button class="btn btn-danger btn-sm" id="cleanup-btn" onclick="cleanupWorkspaces()">Clean up old workspaces</button>
        <span id="cleanup-result"></span>
      </div>
    </div>
  </section>

  <section class="card">
    <div class="card-head">
      <h2>Start New Session</h2>
    </div>
    <div class="card-body">
      <form id="start-form">

        <!-- Repo selector: dropdown or manual -->
        <label id="label-dropdown">
          <span>Repository <button type="button" class="mode-toggle" id="toggle-mode">enter URL manually</button></span>
          <select id="repo-select" name="repo-select">
            <option value="">Loading repositories…</option>
          </select>
          <span class="repo-hint" id="repo-hint"></span>
        </label>

        <label id="label-manual" style="display:none">
          <span>Git URL <button type="button" class="mode-toggle" id="toggle-mode-back">pick from list</button></span>
          <input type="text" name="project-manual" id="project-manual" placeholder="git@github.com:user/repo.git">
        </label>

        <label id="label-branch-select">
          <span>Branch <button type="button" class="mode-toggle" id="toggle-branch-mode">enter manually</button></span>
          <select id="branch-select">
            <option value="">— select a repo first —</option>
          </select>
        </label>
        <label id="label-branch-manual" style="display:none">
          <span>Branch <button type="button" class="mode-toggle" id="toggle-branch-mode-back">pick from list</button></span>
          <input type="text" id="branch-manual" placeholder="main">
        </label>

        <label>
          <span>New branch <span class="field-note">(optional — create and checkout after clone)</span></span>
          <input type="text" id="new-branch" placeholder="feature/my-work">
        </label>

        <label class="checkbox-row">
          <input type="checkbox" name="force">
          Force-reset if a workspace already exists for this project + branch
        </label>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Start Session</button>
          <span id="msg-error" class="msg"></span>
          <span id="msg-success" class="msg"></span>
        </div>
      </form>
    </div>
  </section>

</main>

<div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" style="display:none">
  <div class="modal">
    <div class="modal-body">
      <h3 id="modal-title"></h3>
      <p id="modal-message"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="modal-cancel">Cancel</button>
      <button class="btn btn-danger btn-sm" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<script>
const TERMINAL_URL = '/tty';
let manualMode = false;
let branchManualMode = false;
let reposCache = [];

// --- Repo dropdown ---
async function loadRepos() {
  try {
    const res = await fetch('/api/repos');
    if (!res.ok) throw new Error();
    reposCache = await res.json();
    const sel = document.getElementById('repo-select');
    sel.innerHTML = '<option value="">— select a repository —</option>'
      + reposCache.map(r =>
          `<option value="${escHtml(r.sshUrl)}" data-branch="${escHtml(r.defaultBranch)}" data-fullname="${escHtml(r.fullName)}">`
          + `${escHtml(r.fullName)}${r.private ? ' 🔒' : ''}`
          + `</option>`
        ).join('');
    document.getElementById('repo-hint').textContent = `${reposCache.length} repos loaded`;
  } catch {
    document.getElementById('repo-select').innerHTML = '<option value="">Failed to load — use manual mode</option>';
    document.getElementById('repo-hint').textContent = '';
  }
}

document.getElementById('repo-select').addEventListener('change', async function () {
  const opt = this.options[this.selectedIndex];
  const fullName = opt.dataset.fullname;
  const defaultBranch = opt.dataset.branch;
  const sel = document.getElementById('branch-select');

  if (!fullName) {
    sel.innerHTML = '<option value="">— select a repo first —</option>';
    return;
  }

  sel.innerHTML = '<option value="">Loading branches…</option>';
  sel.disabled = true;

  try {
    const res = await fetch(`/api/branches?repo=${encodeURIComponent(fullName)}`);
    if (!res.ok) throw new Error();
    const branches = await res.json();
    sel.innerHTML = branches.map(b =>
      `<option value="${escHtml(b)}"${b === defaultBranch ? ' selected' : ''}>${escHtml(b)}</option>`
    ).join('');
    // Also sync manual input
    document.getElementById('branch-manual').value = defaultBranch || '';
  } catch {
    sel.innerHTML = '<option value="">Failed to load branches</option>';
    // Fall back to manual with default branch pre-filled
    document.getElementById('branch-manual').value = defaultBranch || '';
    setBranchManualMode(true);
  } finally {
    sel.disabled = false;
  }
});

function setBranchManualMode(manual) {
  branchManualMode = manual;
  document.getElementById('label-branch-select').style.display = manual ? 'none' : '';
  document.getElementById('label-branch-manual').style.display = manual ? '' : 'none';
}
document.getElementById('toggle-branch-mode').addEventListener('click', () => setBranchManualMode(true));
document.getElementById('toggle-branch-mode-back').addEventListener('click', () => setBranchManualMode(false));

// --- Mode toggle ---
function setManualMode(manual) {
  manualMode = manual;
  document.getElementById('label-dropdown').style.display = manual ? 'none' : '';
  document.getElementById('label-manual').style.display = manual ? '' : 'none';
}
document.getElementById('toggle-mode').addEventListener('click', () => setManualMode(true));
document.getElementById('toggle-mode-back').addEventListener('click', () => setManualMode(false));

// --- Sessions ---
async function loadSessions() {
  try {
    const res = await fetch('/api/sessions');
    const sessions = await res.json();
    renderSessions(sessions);
  } catch {
    document.getElementById('sessions-container').innerHTML = '<p class="empty">Failed to load sessions.</p>';
  }
}

function makeSessionCard(s) {
  const statusClass = s.status === 'running' ? 'running' : 'dead';
  const started = new Date(s.startedAt).toLocaleString();
  const repoLabel = s.project.replace(/^.*[:/]/, '').replace(/\.git$/, '');
  const resPlaceholder = s.status === 'running' ? '…' : '—';
  const card = document.createElement('div');
  card.className = 'session-card';
  card.dataset.session = s.name;
  card.innerHTML = `
    <div class="session-card-head">
      <span class="session-name" title="${escHtml(s.name)}">${escHtml(s.name)}</span>
      <span class="badge ${statusClass}">${escHtml(s.status)}</span>
    </div>
    <div class="session-meta">
      <span class="session-repo">${escHtml(repoLabel)} <span class="branch">${escHtml(s.branch)}</span></span>
      <span class="session-time">${started}</span>
    </div>
    <div class="session-footer">
      <div class="session-stats">
        <div class="stat-bar-group">
          <div class="stat-bar-row">
            <span class="stat-label">CPU</span>
            <span class="stat-value placeholder" id="cpu-${escHtml(s.name)}">${resPlaceholder}</span>
          </div>
          <div class="stat-bar-track"><div class="stat-bar-fill" id="cpu-bar-${escHtml(s.name)}"></div></div>
        </div>
        <div class="stat-bar-group">
          <div class="stat-bar-row">
            <span class="stat-label">Mem</span>
            <span class="stat-value placeholder" id="mem-${escHtml(s.name)}">${resPlaceholder}</span>
          </div>
          <div class="stat-bar-track"><div class="stat-bar-fill" id="mem-bar-${escHtml(s.name)}"></div></div>
        </div>
      </div>
      <div class="session-actions">
        <button class="btn btn-ghost btn-sm" onclick="openTerminal('${escHtml(s.name)}')">Terminal</button>
        <button class="btn btn-danger btn-sm" onclick="terminateSession('${escHtml(s.name)}')">Terminate</button>
      </div>
    </div>`;
  return card;
}

function renderSessions(sessions) {
  const container = document.getElementById('sessions-container');

  if (!sessions.length) {
    container.innerHTML = '<p class="empty">No active sessions.</p>';
    return;
  }

  // Create the list shell once; reuse on subsequent renders so DOM state is preserved
  if (!container.querySelector('.session-list')) {
    container.innerHTML = '<div class="session-list"></div>';
  }

  const list = container.querySelector('.session-list');
  const existing = new Map([...list.querySelectorAll('[data-session]')].map(c => [c.dataset.session, c]));

  sessions.forEach((s, i) => {
    let card = existing.get(s.name);
    if (!card) {
      card = makeSessionCard(s);
      existing.set(s.name, card);
    } else {
      const badge = card.querySelector('.badge');
      if (badge) { badge.className = `badge ${s.status === 'running' ? 'running' : 'dead'}`; badge.textContent = s.status; }
    }
    const atPos = list.children[i];
    if (atPos !== card) list.insertBefore(card, atPos || null);
  });

  const currentNames = new Set(sessions.map(s => s.name));
  for (const [name, card] of existing) {
    if (!currentNames.has(name)) card.remove();
  }
}

async function openTerminal(name) {
  await fetch(`/api/sessions/${encodeURIComponent(name)}/activate`, { method: 'POST' });
  window.open(TERMINAL_URL, '_blank');
}

async function terminateSession(name) {
  if (!await showConfirm('Terminate session', `Terminate session "${name}"?`, 'Terminate')) return;
  try {
    await fetch(`/api/sessions/${encodeURIComponent(name)}`, { method: 'DELETE' });
    loadSessions();
  } catch {
    await showAlert('Error', 'Failed to terminate session.');
  }
}

async function removeInactiveSessions() {
  const btn = document.getElementById('remove-inactive-btn');
  btn.disabled = true;
  try {
    const res = await fetch('/api/sessions');
    if (!res.ok) throw new Error();
    const sessions = await res.json();
    const inactive = sessions.filter(s => s.status !== 'running');
    if (!inactive.length) { await showAlert('No inactive sessions', 'There are no inactive sessions to remove.'); return; }
    if (!await showConfirm('Remove inactive sessions', `Remove ${inactive.length} inactive session(s)?`, 'Remove')) return;
    await Promise.all(inactive.map(s =>
      fetch(`/api/sessions/${encodeURIComponent(s.name)}`, { method: 'DELETE' })
    ));
    loadSessions();
  } catch {
    await showAlert('Error', 'Failed to remove inactive sessions.');
  } finally {
    btn.disabled = false;
  }
}

// --- Resource monitoring ---
function fmtCpu(millicores) {
  if (millicores >= 1000) return (millicores / 1000).toFixed(2) + ' cores';
  return millicores + 'm';
}
function fmtMem(mib) {
  if (mib >= 1024) return (mib / 1024).toFixed(2) + ' GiB';
  return mib.toFixed(0) + ' MiB';
}

const CPU_MAX  = 2000;  // millicores
const MEM_MAX  = 2048;  // MiB

function barLevel(pct) {
  if (pct >= 85) return 'crit';
  if (pct >= 60) return 'warn';
  return '';
}

function updateResourceCells(data) {
  for (const [name, stats] of Object.entries(data.sessions || {})) {
    const cpuEl    = document.getElementById(`cpu-${name}`);
    const memEl    = document.getElementById(`mem-${name}`);
    const cpuBar   = document.getElementById(`cpu-bar-${name}`);
    const memBar   = document.getElementById(`mem-bar-${name}`);
    if (!cpuEl || !memEl) continue;

    const cpuPct = Math.min(100, (stats.cpuMillicores / CPU_MAX) * 100);
    const memPct = Math.min(100, (stats.memMiB / MEM_MAX) * 100);

    cpuEl.textContent = fmtCpu(stats.cpuMillicores);
    memEl.textContent = fmtMem(stats.memMiB);
    cpuEl.className = 'stat-value';
    memEl.className = 'stat-value';

    if (cpuBar) { cpuBar.style.width = cpuPct + '%'; cpuBar.className = 'stat-bar-fill ' + barLevel(cpuPct); }
    if (memBar) { memBar.style.width = memPct + '%'; memBar.className = 'stat-bar-fill ' + barLevel(memPct); }
  }

  if (data.totals) {
    const t = data.totals;
    const oCpuEl  = document.getElementById('overall-cpu');
    const oMemEl  = document.getElementById('overall-mem');
    const oCpuBar = document.getElementById('overall-cpu-bar');
    const oMemBar = document.getElementById('overall-mem-bar');
    const cpuPct  = Math.min(100, (t.cpuMillicores / CPU_MAX) * 100);
    const memPct  = Math.min(100, (t.memMiB / MEM_MAX) * 100);
    if (oCpuEl)  { oCpuEl.textContent = fmtCpu(t.cpuMillicores); oCpuEl.className = 'stat-value'; }
    if (oMemEl)  { oMemEl.textContent = fmtMem(t.memMiB); oMemEl.className = 'stat-value'; }
    if (oCpuBar) { oCpuBar.style.width = cpuPct + '%'; oCpuBar.className = 'stat-bar-fill ' + barLevel(cpuPct); }
    if (oMemBar) { oMemBar.style.width = memPct + '%'; oMemBar.className = 'stat-bar-fill ' + barLevel(memPct); }
  }
}

async function loadResources() {
  try {
    const res = await fetch('/api/resources');
    if (!res.ok) return;
    const data = await res.json();
    updateResourceCells(data);
  } catch { /* silently ignore transient errors */ }
}

// --- Form submit ---
document.getElementById('start-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const errEl = document.getElementById('msg-error');
  const okEl  = document.getElementById('msg-success');
  errEl.textContent = '';
  okEl.textContent  = '';

  const project = manualMode
    ? document.getElementById('project-manual').value.trim()
    : document.getElementById('repo-select').value;

  if (!project) {
    errEl.textContent = manualMode ? 'Please enter a Git URL.' : 'Please select a repository.';
    return;
  }

  const branch = branchManualMode
    ? document.getElementById('branch-manual').value.trim()
    : document.getElementById('branch-select').value.trim();

  if (!branch) { errEl.textContent = 'Branch is required.'; return; }

  const newBranch = document.getElementById('new-branch').value.trim();
  const body = { project, branch, force: form.force.checked, ...(newBranch && { newBranch }) };

  const submitBtn = form.querySelector('button[type=submit]');
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span>Starting…';

  try {
    const res = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const data = await res.json();
      errEl.textContent = data.error + (data.detail ? ': ' + data.detail : '');
      return;
    }
    const session = await res.json();
    okEl.textContent = `Session "${session.name}" started.`;
    form.reset();
    document.getElementById('branch-select').innerHTML = '<option value="">— select a repo first —</option>';
    document.getElementById('branch-manual').value = '';
    document.getElementById('new-branch').value = '';
    loadSessions();
  } catch {
    errEl.textContent = 'Request failed.';
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = 'Start Session';
  }
});

async function cleanupWorkspaces() {
  const btn = document.getElementById('cleanup-btn');
  const resultEl = document.getElementById('cleanup-result');
  const days = parseInt(document.getElementById('cleanup-days').value, 10);

  if (!days || days < 1) {
    resultEl.style.color = 'var(--danger)';
    resultEl.textContent = 'Enter a valid number of days.';
    return;
  }

  if (!await showConfirm('Clean up workspaces', `Delete workspaces older than ${days} day(s)? This cannot be undone.`, 'Delete')) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Cleaning…';
  resultEl.style.color = 'var(--text-muted)';
  resultEl.textContent = '';

  try {
    const res = await fetch('/api/workspaces/cleanup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ olderThanDays: days }),
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.error || 'Request failed');
    }
    const data = await res.json();
    if (data.deleted.length === 0) {
      resultEl.style.color = 'var(--text-muted)';
      resultEl.textContent = 'No workspaces to clean up.';
    } else {
      resultEl.style.color = 'var(--success)';
      resultEl.textContent = `Deleted ${data.deleted.length} workspace(s), freed ${data.totalFreedMb} MB.`;
    }
    loadSessions();
  } catch (err) {
    resultEl.style.color = 'var(--danger)';
    resultEl.textContent = err.message || 'Cleanup failed.';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Clean up old workspaces';
  }
}

function showConfirm(title, message, confirmLabel = 'Confirm', alertOnly = false) {
  return new Promise(resolve => {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-message').textContent = message;
    const confirmBtn = document.getElementById('modal-confirm');
    const cancelBtn  = document.getElementById('modal-cancel');
    confirmBtn.textContent = alertOnly ? 'OK' : confirmLabel;
    cancelBtn.style.display = alertOnly ? 'none' : '';
    const overlay = document.getElementById('modal-overlay');
    overlay.style.display = 'flex';
    confirmBtn.focus();

    function cleanup(result) {
      overlay.style.display = 'none';
      confirmBtn.onclick = null;
      cancelBtn.onclick = null;
      overlay.onclick = null;
      document.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function onKey(e) {
      if (e.key === 'Escape') cleanup(false);
      if (e.key === 'Enter' && document.activeElement === confirmBtn) cleanup(true);
    }
    confirmBtn.onclick = () => cleanup(true);
    cancelBtn.onclick  = () => cleanup(false);
    overlay.onclick    = (e) => { if (e.target === overlay) cleanup(false); };
    document.addEventListener('keydown', onKey);
  });
}

function showAlert(title, message) {
  return showConfirm(title, message, '', true);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

fetch('/api/info').then(r => r.json()).then(d => {
  if (d.podName) document.getElementById('pod-name').textContent = d.podName;
}).catch(() => {});

async function loadDiskUsage() {
  try {
    const d = await fetch('/api/disk').then(r => r.json());
    const pct = parseInt(d.usePercent, 10) || 0;
    const el = document.getElementById('disk-usage');
    const bar = document.getElementById('disk-bar');
    el.textContent = `${d.used} / ${d.size}`;
    el.classList.remove('placeholder');
    bar.style.width = pct + '%';
    bar.classList.toggle('warn', pct >= 70 && pct < 90);
    bar.classList.toggle('crit', pct >= 90);
  } catch { /* ignore */ }
}

loadRepos();
loadSessions();
loadResources();
loadDiskUsage();
setInterval(loadSessions,   10_000);
setInterval(loadResources,   5_000);
setInterval(loadDiskUsage, 60_000);
</script>
